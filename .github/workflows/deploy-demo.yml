name: deploy-demo

# Builds the demo/ app and publishes it to GitHub Pages on every push to main.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# Live at: https://eaeao.github.io/summernote-react/
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# allow one concurrent deployment; don't cancel an in-progress run mid-deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install demo deps
        run: yarn install --frozen-lockfile
        working-directory: demo
      - name: Build demo (base = /summernote-react/)
        run: yarn build
        working-directory: demo
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

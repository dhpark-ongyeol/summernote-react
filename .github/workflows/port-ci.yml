name: port-ci

# CI for the React + TypeScript port (@eaeao4jerry/summernote-* packages).
# Multi-engine gate: the suite must pass on BOTH Chromium and WebKit from day one.
on:
  push:
    branches: [react-ts-port, main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: yarn install --frozen-lockfile --ignore-scripts
      - name: jQuery-ban gate
        run: node scripts/check-no-jquery.mjs
      - name: Zero-dep gate
        run: node scripts/check-no-runtime-deps.mjs
      - name: Typecheck
        run: |
          yarn workspace @eaeao4jerry/summernote-core typecheck
          yarn workspace @eaeao4jerry/summernote-react typecheck
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium webkit
      - name: Test (chromium + webkit)
        run: yarn vitest run
